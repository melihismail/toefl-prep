function getLang(){try{return window.i18n?window.i18n.getLang():(localStorage.getItem('toefl_lang')||(navigator.language.startsWith('tr')?'tr':'en'));}catch(e){return 'en';}}
function t(o){return o[getLang()]||o.en;}
function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=b[i];b[i]=b[j];b[j]=tmp;}return b;}

function openPanel(n,html){
  for(var i=1;i<n;i++) document.getElementById('panel-'+i).classList.add('dimmed');
  document.getElementById('panel-'+n+'-content').innerHTML=html;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('panel-'+n).classList.add('open');
  document.getElementById('panel-'+n).scrollTop=0;
  document.body.style.overflow='hidden';
}
function closePanel(n){
  for(var i=n;i<=3;i++){document.getElementById('panel-'+i).classList.remove('open');document.getElementById('panel-'+i).classList.remove('dimmed');}
  if(n>1) document.getElementById('panel-'+(n-1)).classList.remove('dimmed');
  if(n===1){document.getElementById('panel-overlay').classList.remove('open');document.body.style.overflow='';document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active');});}
  if(n<=2){document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active');});}
  if(n<=3){var eb=document.getElementById('example-btn');if(eb)eb.classList.remove('active');}
}
function closeAll(){for(var i=1;i<=3;i++){document.getElementById('panel-'+i).classList.remove('open','dimmed');}document.getElementById('panel-overlay').classList.remove('open');document.body.style.overflow='';}

function openSection(key){
  var s=D[key],lang=getLang();
  var h='<div class="detail-header"><div class="top"><div class="icon-wrap" style="background:'+s.bg+'"><i class="ti '+s.icon+'" style="color:'+s.color+'" aria-hidden="true"></i></div><div><div class="name">'+t(s.name)+'</div><div class="sub">'+s.time+' · '+s.tasks.length+' '+(lang==='tr'?'görev türü':'task types')+'</div></div></div><div class="desc">'+t(s.desc)+'</div></div>';
  for(var i=0;i<s.tasks.length;i++){var tk=s.tasks[i];h+='<div class="task-item" onclick="openTaskPanel(\''+key+'\','+i+')"><div class="task-top"><div class="task-name">'+t(tk.name)+'</div><div class="task-time">'+tk.time+'</div></div><div class="task-desc">'+t(tk.desc)+'</div><div class="task-meta"><span>'+t(tk.count)+'</span><span class="task-go">'+(lang==='tr'?'Detaylar':'Details')+' <i class="ti ti-arrow-right" aria-hidden="true"></i></span></div></div>';}
  openPanel(1,h);
}

var _curSection=null,_curTask=null;
function openTaskPanel(sKey,tIdx){
  _curSection=sKey;_curTask=tIdx;
  var tk=D[sKey].tasks[tIdx],lang=getLang();
  document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active');});
  var items=document.querySelectorAll('.task-item');
  if(items[tIdx]) items[tIdx].classList.add('active');

  var h='<div class="td-header"><div class="td-name">'+t(tk.name)+'</div><div class="td-sub">'+tk.time+' · '+t(tk.count)+'</div><div class="td-desc">'+t(tk.desc)+'</div></div>';

  h+='<button class="example-btn" id="example-btn" onclick="openExample()"><div class="eb-icon"><i class="ti ti-file-text" aria-hidden="true"></i></div><div><div class="eb-label">'+(lang==='tr'?'Örnek soru':'Example question')+'</div><div class="eb-sub">'+(lang==='tr'?'Görevi deneyin':'Try the task')+'</div></div></button>';

  var accData=[
    {icon:'ti-bulb',label:{en:'Tips & strategy',tr:'İpuçları ve strateji'},content:'<div class="placeholder-content">'+t(tk.tips)+'</div>'},
    {icon:'ti-chart-bar',label:{en:'Scoring',tr:'Puanlama'},content:'<div class="placeholder-content">'+t(tk.scoring)+'</div>'}
  ];
  for(var i=0;i<accData.length;i++){
    var a=accData[i];
    h+='<div class="accordion"><button class="accordion-btn" onclick="toggleAcc(this)"><span class="acc-label"><i class="ti '+a.icon+'" aria-hidden="true"></i> '+t(a.label)+'</span><i class="ti ti-chevron-down acc-chevron" aria-hidden="true"></i></button><div class="accordion-body"><div class="accordion-inner">'+a.content+'</div></div></div>';
  }
  openPanel(2,h);
}

function openExample(){
  var tk=D[_curSection].tasks[_curTask],lang=getLang();
  var btn=document.getElementById('example-btn');
  if(btn) btn.classList.add('active');
  var h='<div class="content-title"><i class="ti ti-file-text" aria-hidden="true"></i> '+(lang==='tr'?'Örnek soru':'Example question')+'</div>';
  h+=demoFns[tk.demo]();
  openPanel(3,h);
}

function toggleAcc(btn){btn.classList.toggle('active');btn.nextElementSibling.classList.toggle('open');}

function mcqOpts(opts,answer){
  var letters=['A','B','C','D'],id='m'+Math.random().toString(36).substr(2,5),h='<div id="'+id+'">';
  for(var i=0;i<opts.length;i++) h+='<div class="demo-option" onclick="pickMCQ(this,'+answer+','+i+',\''+id+'\')"><span class="letter">'+letters[i]+'</span><span>'+opts[i]+'</span></div>';
  return h+'</div>';
}
function pickMCQ(el,correct,chosen,cid){var c=document.getElementById(cid);if(c.dataset.done)return;c.dataset.done='1';c.querySelectorAll('.demo-option')[correct].classList.add('correct');if(chosen!==correct)c.querySelectorAll('.demo-option')[chosen].classList.add('wrong');}

var demoFns={
  chooseResponse:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-question">"Do you know if the library has extended hours during finals week?"</div>'+mcqOpts(["The library has a great collection of science books.","I'm not sure, but you could check their website for the schedule.","Finals week is usually in December.","I prefer studying at the student centre."],1)+'</div>';},
  conversation:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-transcript">Student: Professor Chen, do you have a few minutes?\nProfessor Chen: Of course, come in.\nStudent: I\'m having trouble narrowing down my topic about social media.\nProfessor Chen: What aspect interests you most?\nStudent: How it affects mental health in teenagers.</div><div class="demo-question">What is the student\'s problem?</div>'+mcqOpts(["The student needs help with research methods.","The student's topic is too broad.","The student can't find sources.","The student missed a deadline."],1)+'</div>';},
  academicTalk:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-transcript">Today I want to discuss the urban heat island effect. Cities are significantly warmer than rural areas, sometimes by five degrees Celsius. The main reason is that urban surfaces — roads, buildings, parking lots — absorb solar energy and release it slowly as heat.</div><div class="demo-question">What is the main topic of this lecture?</div>'+mcqOpts(["Why cities attract more storms","The urban heat island effect","How concrete is manufactured","Benefits of green architecture"],1)+'</div>';},
  completeWords:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-passage">Climate change is one of the most pre<input class="demo-letter-input" maxlength="5" data-answer="ssing" id="cw1" style="width:50px">ing challenges facing humanity today. Rising temperatures are causing po<input class="demo-letter-input" maxlength="3" data-answer="lar" id="cw2" style="width:30px"> ice caps to melt.</div><button class="demo-btn" onclick="checkCW()">Check</button></div>';},
  dailyLife:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-passage"><strong>From:</strong> Westfield University Bookstore<br><strong>Subject:</strong> Book Return Deadline – December 18<br><br>Dear Students,<br>All rented textbooks must be returned by December 18th. Late returns will incur a $5/day fee. Please bring your student ID.</div><div class="demo-question">What is the main purpose of this email?</div>'+mcqOpts(["To announce new textbooks","To remind students about the return deadline","To explain how to rent textbooks","To advertise a bookstore sale"],1)+'</div>';},
  academicPassage:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-passage">Very young children cannot recognize themselves in a mirror; they usually achieve this around 18 months. Scientists assumed only humans had this ability. However, experiments showed great apes could also recognize their reflections. Dolphins and elephants have also passed this test.</div><div class="demo-question">What is the main idea of this passage?</div>'+mcqOpts(["Young children are more self-aware than animals.","The mirror test has revealed self-recognition in several species.","Only great apes can pass the mirror test.","The mirror test is not reliable."],1)+'</div>';},
  buildSentence:function(){var q={question:"Did the dining hall managers add more vegetarian meals?",prompt:"No,",correct:["they","have","not","changed","the menu"],distractor:"tomorrow"},words=shuffle([...q.correct,q.distractor]);var h='<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-question">"'+q.question+'"</div><div class="demo-blanks" id="bs-blanks"><span class="demo-prompt">'+q.prompt+'</span>';for(var i=0;i<q.correct.length;i++)h+='<div class="demo-blank empty" id="bs-b'+i+'">—</div>';h+='</div><div class="demo-chips" id="bs-chips">';for(var i=0;i<words.length;i++)h+='<button class="demo-chip" onclick="bsPlace(this)">'+words[i]+'</button>';h+='</div><button class="demo-btn" onclick="bsCheck()">Check</button> <button class="demo-btn demo-btn-outline" onclick="bsReset()">Reset</button><div id="bs-feedback" style="margin-top:8px"></div></div>';window._bsC=q.correct;window._bsP=[];return h;},
  writeEmail:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-passage"><strong>Situation:</strong> Your professor changed the exam date. Write an email asking about the new schedule and whether the study materials will change.</div><textarea class="demo-textarea" placeholder="Dear Professor..." oninput="updateDemoWC(this)"></textarea><div class="demo-word-count">0 words</div><div class="demo-note">Demo mode — no AI feedback</div></div>';},
  academicDiscussion:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-disc-box"><div class="demo-disc-prof">Professor Williams asks:</div><div class="demo-disc-q">Should universities require students to attend all classes?</div></div><div class="demo-student"><div class="demo-student-name">Marcus</div><div class="demo-student-text">Attendance should be mandatory. Students miss key discussions when they skip.</div></div><div class="demo-student"><div class="demo-student-name">Aisha</div><div class="demo-student-text">University students are adults and should manage their own learning.</div></div><textarea class="demo-textarea" placeholder="I believe that..." oninput="updateDemoWC(this)"></textarea><div class="demo-word-count">0 words</div><div class="demo-note">Demo mode — no AI feedback</div></div>';},
  listenRepeat:function(){var s="The university library offers extended hours during the examination period.";return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-sentence-target">'+s+'</div><button class="demo-btn" onclick="speakDemo(\''+s.replace(/'/g,"\\'")+'\')" style="margin-bottom:12px"><i class="ti ti-player-play" style="font-size:14px" aria-hidden="true"></i> Listen</button><div class="demo-mic-area"><div class="demo-mic-btn"><i class="ti ti-microphone" aria-hidden="true"></i></div><div class="demo-mic-label">Recording disabled in demo</div></div></div>';},
  interview:function(){return '<div class="demo-box"><div class="demo-label">Try it</div><div class="demo-interview-q">"Describe a skill you have learned outside of school. How did you learn it and how has it been useful?"</div><div style="display:flex;gap:12px;justify-content:center;margin-bottom:8px;font-size:12px;color:#6b7280"><span>Think: 15 sec</span><span>·</span><span>Speak: 45 sec</span></div><div class="demo-mic-area"><div class="demo-mic-btn"><i class="ti ti-microphone" aria-hidden="true"></i></div><div class="demo-mic-label">Recording disabled in demo</div></div></div>';}
};

function checkCW(){['cw1','cw2'].forEach(function(id){var inp=document.getElementById(id);if(!inp)return;inp.className='demo-letter-input '+(inp.value.trim().toLowerCase()===inp.dataset.answer?'correct':'wrong');inp.disabled=true;});}
function bsPlace(chip){if(window._bsP.length>=window._bsC.length)return;window._bsP.push(chip.textContent);chip.classList.add('used');var b=document.getElementById('bs-b'+(window._bsP.length-1));if(b){b.textContent=chip.textContent;b.classList.remove('empty');b.classList.add('filled');}}
function bsCheck(){var ok=window._bsP.join(' ')===window._bsC.join(' ');document.getElementById('bs-feedback').innerHTML=ok?'<span style="color:#15803d;font-size:13px;font-weight:600">Correct!</span>':'<span style="color:#b91c1c;font-size:13px;font-weight:600">Not quite.</span> <span style="font-size:12px;color:#4b5563">Correct: No, '+window._bsC.join(' ')+'</span>';}
function bsReset(){window._bsP=[];for(var i=0;i<window._bsC.length;i++){var b=document.getElementById('bs-b'+i);if(b){b.textContent='—';b.className='demo-blank empty';}}document.querySelectorAll('#bs-chips .demo-chip').forEach(function(c){c.classList.remove('used');});document.getElementById('bs-feedback').innerHTML='';}
function updateDemoWC(ta){var wc=ta.value.trim().split(/\s+/).filter(function(w){return w.length>0;}).length;ta.parentElement.querySelector('.demo-word-count').textContent=wc+' words';}
function speakDemo(text){if('speechSynthesis' in window){var u=new SpeechSynthesisUtterance(text);u.rate=0.9;speechSynthesis.speak(u);}}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeAll();});
</script>
