<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Build a Sentence — TOEFL 2026</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="section-writing">
<div class="app">

  <!-- Quiz view -->
  <div id="quiz-view">
    <div class="topbar">
      <a href="../../pages/writing.html" class="back-btn" style="color:var(--muted)">← Writing</a>
      <div class="exam-label">Build a Sentence</div>
      <div class="q-counter" id="q-counter">1 / 16</div>
    </div>
    <div class="progress-wrap" style="margin-bottom:1.5rem">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="card" id="main-card"></div>
    <div class="nav-row">
      <button class="btn" id="btn-prev" onclick="goTo(currentIdx-1)">← Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="handleNext()">Next →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div id="score-screen" style="display:none">
    <div class="score-hero">
      <div class="score-circle">
        <span class="big" id="score-num">0/16</span>
        <span class="small">correct</span>
      </div>
      <p class="score-msg" id="score-msg"></p>
      <button class="btn btn-primary" onclick="restart()">Start new exam</button>
    </div>
    <div class="card">
      <div class="review-title">Your answers</div>
      <div id="review-list"></div>
    </div>
    <div class="restart-row">
      <button class="btn btn-primary" onclick="restart()">Start new exam</button>
    </div>
  </div>

</div>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
