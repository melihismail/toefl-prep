<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Academic Discussion — TOEFL 2026</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="section-writing">
<div class="app">
  <div class="topbar">
    <a href="../../pages/writing.html" class="back-btn" style="color:var(--muted)">← Writing</a>
    <div class="exam-label">Academic Discussion</div>
    <button class="btn" onclick="showApiKeyModal()" style="font-size:12px;padding:5px 10px">⚙️ API Key</button>
  </div>

  <div class="card" id="main-card"></div>

  <div class="ai-feedback" id="ai-feedback">
    <div class="ai-feedback-header">
      <div class="ai-feedback-title">🤖 AI Feedback</div>
      <div class="ai-score-badge" id="ai-score-badge">Band —</div>
    </div>
    <div class="ai-feedback-body" id="ai-feedback-body">
      <div class="loading-spinner"><div class="loading-dots"><span></span><span></span><span></span></div> Evaluating your response…</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="api-modal">
  <div class="modal">
    <h3>🔑 Anthropic API Key</h3>
    <p>Enter your Anthropic API key to enable AI feedback. Stored in your browser only.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveApiKey()">Save key</button>
      <button class="btn" onclick="closeApiModal()">Cancel</button>
      <button class="btn" onclick="clearApiKey()" style="margin-left:auto;color:var(--error-text)">Clear key</button>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
