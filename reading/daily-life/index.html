<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Read in Daily Life — TOEFL</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .sticky-passage {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--card);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 1rem 1.25rem 0.75rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="section-reading">
<div id="quiz-view">

  <div class="app" style="padding-bottom:0;padding-top:1rem">
    <div class="topbar">
      <a href="../../pages/reading.html" class="back-btn" data-i18n="back_reading">← Reading</a>
      <div class="exam-label" data-i18n="read_in_daily_life">Read in Daily Life</div>
      <div class="q-counter" id="q-counter">Passage 1 of 8</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Sticky passage -->
  <div class="sticky-passage" id="sticky-passage"></div>

  <!-- Questions -->
  <div class="app" style="padding-top:0">
    <div class="card" id="main-card"></div>
    <div class="nav-row">
      <button class="btn" id="btn-prev" onclick="goTo(currentIdx-1)" data-i18n="previous">← Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="handleNext()" data-i18n="next">Next →</button>
    </div>
  </div>

</div>

<!-- Score screen -->
<div id="score-screen" style="display:none">
  <div class="app">
    <div class="score-hero">
      <div class="score-circle">
        <span class="big" id="score-num"></span>
        <span class="small" data-i18n="correct">correct</span>
      </div>
      <p class="score-msg" id="score-msg"></p>
      <button class="btn btn-primary" onclick="restart()" data-i18n="new_exam">New exam</button>
    </div>
    <div class="card"><div class="review-title" data-i18n="your_answers">Your answers</div><div id="review-list"></div></div>
    <div class="restart-row"><button class="btn btn-primary" onclick="restart()" data-i18n="new_exam">New exam</button></div>
  </div>
</div>

<script src="questions.js"></script>
<script src="../../lang/translations.js"></script>
<script src="../../lang/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
