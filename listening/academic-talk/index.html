<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Academic Talk — TOEFL</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="section-listening">
<div class="app">
  <div class="topbar">
    <a href="../../pages/listening.html" class="back-btn" data-i18n="back_listening">← Listening</a>
    <div class="exam-label" data-i18n="academic_talk">Academic Talk</div>
    <div class="q-counter" id="q-counter">Passage 1 of 3</div>
  </div>
  <div class="progress-wrap" style="margin-bottom:1.5rem">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="card" id="main-card"></div>
  <div class="nav-row">
    <button class="btn" id="btn-prev" onclick="goTo(currentIdx-1)" data-i18n="previous">← Previous</button>
    <button class="btn btn-primary" id="btn-next" onclick="handleNext()" data-i18n="next">Next →</button>
  </div>
</div>
<div class="app score-screen" id="score-screen">
  <div class="score-hero">
    <div class="score-circle"><span class="big" id="score-num"></span><span class="small" data-i18n="correct">correct</span></div>
    <p class="score-msg" id="score-msg"></p>
    <button class="btn btn-primary" onclick="restart()" data-i18n="new_exam">New exam</button>
  </div>
  <div class="card"><div class="review-title" data-i18n="your_answers">Your answers</div><div id="review-list"></div></div>
  <div class="restart-row" style="margin-top:1rem"><button class="btn btn-primary" onclick="restart()" data-i18n="new_exam">New exam</button></div>
</div>
<script src="questions.js"></script>
<script src="../../lang/translations.js"></script>
<script src="../../lang/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
