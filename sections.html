<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEFL Prep</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .section-card { align-items: flex-start; gap: 16px; padding: 1.75rem; }
    .section-card .card-icon { width: 52px; height: 52px; border-radius: 14px; font-size: 24px; }
    .section-card .card-title { font-size: 20px; font-weight: 800; margin-top: 8px; }
    .section-card .card-underline { width: 28px; height: 3px; border-radius: 2px; background: var(--accent-mid); margin-top: 8px; }
  </style>
</head>
<body>

<div class="hero">
  <div class="app-wide">
    <a href="index.html" class="back-btn" data-i18n="back_home">← Home</a>
    <h1 data-i18n="hero_title">Your TOEFL Prep Hub</h1>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">4</div><div class="lbl" data-i18n="sections">Sections</div></div>
      <div class="hero-stat"><div class="num">12</div><div class="lbl" data-i18n="task_types">Task Types</div></div>
      <div class="hero-stat"><div class="num">1–6</div><div class="lbl" data-i18n="band_scale">Band Scale</div></div>
      <div class="hero-stat"><div class="num">~90</div><div class="lbl" data-i18n="min_total">Min Total</div></div>
    </div>
  </div>
</div>

<div class="app-wide">
  <div class="section-label" data-i18n="practice_by_section">Practice by section</div>
  <div class="section-grid">

    <div class="section-card" onclick="location.href='pages/reading.html'">
      <div class="card-icon">📖</div>
      <div class="card-title" data-i18n="reading">Reading</div>
      <div class="card-underline"></div>
    </div>

    <div class="section-card" onclick="location.href='pages/writing.html'">
      <div class="card-icon">✍️</div>
      <div class="card-title" data-i18n="writing">Writing</div>
      <div class="card-underline"></div>
    </div>

    <div class="section-card" onclick="location.href='pages/listening.html'">
      <div class="card-icon">🎧</div>
      <div class="card-title" data-i18n="listening">Listening</div>
      <div class="card-underline"></div>
    </div>

    <div class="section-card" onclick="location.href='pages/speaking.html'">
      <div class="card-icon">🎤</div>
      <div class="card-title" data-i18n="speaking">Speaking</div>
      <div class="card-underline"></div>
    </div>

  </div>
</div>

<footer data-i18n="footer">TOEFL Prep · For practice purposes only · Not affiliated with ETS</footer>
<script src="lang/translations.js"></script>
<script src="lang/i18n.js"></script>
</body>
</html>
