<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Take an Interview — TOEFL</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="section-speaking">
<div id="quiz-view">
  <div class="app" style="padding-bottom:0;padding-top:1rem">
    <div class="topbar">
      <a href="../../pages/speaking.html" class="back-btn" data-i18n="back_speaking">← Speaking</a>
      <div class="exam-label" data-i18n="take_an_interview">Take an Interview</div>
      <div class="q-counter" id="q-counter">1 / 5</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="app" style="padding-top:1rem">
    <div class="card" id="main-card"></div>
    <div class="nav-row" style="margin-top:1rem">
      <button class="btn" id="btn-prev" onclick="goTo(currentIdx-1)" data-i18n="previous">← Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="handleNext()" data-i18n="next">Next →</button>
    </div>
  </div>
</div>
<div id="score-screen" style="display:none">
  <div class="app">
    <div style="text-align:center;padding:2.5rem 1rem">
      <div style="font-size:56px;margin-bottom:1rem">🎙️</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px" data-i18n="interview_complete">Interview Complete!</div>
      <p style="color:var(--muted);margin-bottom:1.5rem" data-i18n="interview_complete_desc">You answered all 5 questions. Paste your result code into any AI for detailed feedback.</p>
      <div class="card" id="result-code-box" style="margin-bottom:1.5rem;text-align:left"></div>
      <button class="btn btn-primary" onclick="restart()" data-i18n="new_session">New session</button>
    </div>
  </div>
</div>
<script src="../../lang/translations.js"></script>
<script src="../../lang/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
