<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Listen and Repeat — TOEFL</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="section-speaking">
<div id="quiz-view">
  <div class="app" style="padding-bottom:0;padding-top:1rem">
    <div class="topbar">
      <a href="../../pages/speaking.html" class="back-btn" style="color:var(--muted)" data-i18n="back_speaking">← Speaking</a>
      <div class="exam-label" data-i18n="listen_and_repeat">Listen and Repeat</div>
      <div class="q-counter" id="q-counter">1 / 10</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="app" style="padding-top:1rem">
    <div class="card" id="main-card"></div>
    <div class="nav-row" style="margin-top:1rem">
      <button class="btn" id="btn-prev" onclick="goTo(currentIdx-1)" data-i18n="previous">← Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="handleNext()" data-i18n="next">Next →</button>
    </div>
  </div>
</div>
<div id="score-screen" style="display:none">
  <div class="app">
    <div class="score-hero">
      <div class="score-circle">
        <span class="big" id="score-num"></span>
        <span class="small" data-i18n="words_correct">words correct</span>
      </div>
      <p class="score-msg" id="score-msg"></p>
      <button class="btn btn-primary" onclick="restart()" data-i18n="new_session">New session</button>
    </div>
    <div class="card"><div class="review-title" data-i18n="your_results">Your results</div><div id="review-list"></div></div>
    <div class="restart-row"><button class="btn btn-primary" onclick="restart()" data-i18n="new_session">New session</button></div>
  </div>
</div>
<script src="../../lang/translations.js"></script>
<script src="../../lang/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
