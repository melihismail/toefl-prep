<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birlikte İngilizce - TOEFL Prep</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: linear-gradient(160deg, #f5f3ff 0%, #ede9fe 40%, #f5f3ff 70%, #ede9fe 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; padding: 2rem 0; }

    .landing-nav { background: rgba(255,255,255,.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.4); border-radius: 999px; padding: 10px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.06); z-index: 100; min-width: 320px; justify-content: space-between; }
    .landing-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 14px; color: var(--text); }
    .landing-logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #7c3aed, #4f46e5); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); border-radius: 4px; }
    .lang-switch { display: flex; background: #7c3aed; border-radius: 999px; overflow: hidden; padding: 3px; }
    .lang-switch button { border: none; background: none; padding: 6px 14px; font-size: 13px; font-weight: 700; cursor: pointer; color: rgba(255,255,255,.6); transition: all .2s; border-radius: 999px; }
    .lang-switch button.active { background: #fff; color: #7c3aed; box-shadow: 0 1px 4px rgba(0,0,0,.15); }

    .landing-content { text-align: center; max-width: 480px; width: 100%; padding: 0 24px; }
    .landing-title { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .landing-title-accent { color: #7c3aed; }
    .landing-status { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 1px; margin-top: 8px; }
    .landing-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; animation: pulse-ring 2s ease-in-out infinite; }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(124,58,237,.5); }
      50% { box-shadow: 0 0 0 8px rgba(124,58,237,0); }
      100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); }
    }

    .landing-cards { display: flex; flex-direction: column; gap: 16px; max-width: 480px; width: 100%; padding: 0 24px 40px; }
    .landing-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,.5); border-radius: 16px; padding: 20px 24px; cursor: pointer; transition: all .2s; text-decoration: none; color: inherit; justify-content: center; }
    .landing-card:hover { border-color: #c4b5fd; box-shadow: 0 4px 24px rgba(124,58,237,.12); transform: translateY(-2px); background: rgba(255,255,255,.75); }
    .landing-card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(245,243,255,.7); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .landing-card-icon svg { width: 24px; height: 24px; stroke: #7c3aed; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .landing-card-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .landing-card-arrow { color: #c4b5fd; font-size: 18px; }

    .lang-toggle { display: none !important; }
  </style>
</head>
<body>

<nav class="landing-nav">
  <div class="landing-logo">
    <div class="landing-logo-icon"></div>
    Birlikte İngilizce — TOEFL Prep
  </div>
  <div class="lang-switch" id="lang-switch">
    <button id="lang-tr" onclick="i18n.setLang('tr')">TR</button>
    <button id="lang-en" onclick="i18n.setLang('en')">EN</button>
  </div>
</nav>

<div class="landing-content">
  <div class="landing-title" data-i18n="landing_title_1">Your journey to Band 6</div>
  <div class="landing-title landing-title-accent" data-i18n="landing_title_2">begins here.</div>
  <div class="landing-status">
    <div class="landing-status-dot"></div>
    <span data-i18n="landing_status">READY</span>
  </div>
</div>

<div class="landing-cards">
  <a class="landing-card" href="pages/learn.html">
    <div class="landing-card-icon">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <div class="landing-card-title" data-i18n="learn_the_exam">Learn the Exam</div>
    <div class="landing-card-arrow">›</div>
  </a>

  <a class="landing-card" href="sections.html">
    <div class="landing-card-icon">
      <svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
    </div>
    <div class="landing-card-title" data-i18n="exam_samples">Exam Samples</div>
    <div class="landing-card-arrow">›</div>
  </a>
</div>

<script src="lang/translations.js"></script>
<script src="lang/i18n.js"></script>
<script>
  function updateLangSwitch(){
    var lang = i18n.getLang();
    document.getElementById('lang-tr').className = lang === 'tr' ? 'active' : '';
    document.getElementById('lang-en').className = lang === 'en' ? 'active' : '';
  }
  var origSetLang = i18n.setLang;
  i18n.setLang = function(lang){ origSetLang(lang); updateLangSwitch(); };
  updateLangSwitch();
</script>
</body>
</html>
